<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12161a" />
    <title>视频脚本题词器</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="题词器播放区">
        <header class="stage-header">
          <div class="mark" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
          <div class="title-stack">
            <p>Prompter</p>
            <h1>视频脚本题词器</h1>
          </div>
          <button class="icon-button ghost mobile-panel-toggle" id="mobilePanelToggle" type="button" aria-label="设置" title="设置">
            <span aria-hidden="true">☰</span>
          </button>
        </header>

        <div class="teleprompter" id="teleprompter" tabindex="0">
          <div class="guide-line" id="guideLine" aria-hidden="true"></div>
          <div class="countdown-overlay" id="countdownOverlay" aria-live="polite" hidden></div>
          <article class="script-output" id="scriptOutput"></article>
        </div>

        <div class="tts-float" id="ttsFloat" aria-label="朗读参考悬浮工具">
          <div class="tts-float-header">
            <span class="tts-float-title">朗读参考</span>
            <output id="ttsStatusValue">待机</output>
          </div>
          <div class="tts-float-body">
            <div class="tts-segment-nav" aria-label="朗读段落选择">
              <button class="icon-button small" id="ttsPrevParagraph" type="button" aria-label="上一段" title="上一段">
                <span aria-hidden="true">‹</span>
              </button>
              <button class="tool-button tts-main-button" id="speakCurrent" type="button">朗读当前段</button>
              <button class="icon-button small" id="ttsNextParagraph" type="button" aria-label="下一段" title="下一段">
                <span aria-hidden="true">›</span>
              </button>
            </div>
            <div class="tts-float-meta">
              <output id="ttsParagraphLabel">第 0 / 0 段</output>
              <button class="tool-button subtle" id="stopSpeaking" type="button">停止</button>
            </div>
            <p class="tts-preview on-stage" id="ttsPreview">当前没有可朗读的段落</p>
            <p class="tts-support-note" id="ttsSupportNote" hidden>当前浏览器可能不支持朗读，建议用系统 Chrome 打开。</p>
          </div>
        </div>

        <footer class="playbar" aria-label="播放控制">
          <button class="icon-button primary" id="playPause" type="button" aria-label="开始滚动" title="开始/暂停">
            <span id="playIcon" aria-hidden="true">▶</span>
          </button>
          <button class="icon-button" id="resetScroll" type="button" aria-label="回到开头" title="回到开头">
            <span aria-hidden="true">↺</span>
          </button>
          <button class="icon-button" id="jumpBack" type="button" aria-label="后退" title="后退">
            <span aria-hidden="true">‹</span>
          </button>
          <button class="icon-button" id="jumpForward" type="button" aria-label="前进" title="前进">
            <span aria-hidden="true">›</span>
          </button>
          <button class="icon-button" id="fullscreenToggle" type="button" aria-label="全屏" title="全屏">
            <span aria-hidden="true">⛶</span>
          </button>
          <div class="progress-group" aria-label="滚动进度">
            <div class="progress-topline">
              <output id="activeParagraphLabel">第 0 / 0 段</output>
              <output id="progressLabel">0%</output>
              <output id="remainingLabel">剩余 00:00</output>
            </div>
            <input
              class="progress-scrubber"
              id="progressInput"
              type="range"
              min="0"
              max="1000"
              step="1"
              value="0"
              aria-label="滚动位置"
            />
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </footer>
      </section>

      <aside class="control-panel" id="controlPanel" aria-label="脚本与设置">
        <section class="panel-section editor-section">
          <div class="section-heading">
            <h2>脚本</h2>
            <div class="button-row">
              <button class="tool-button" id="loadSample" type="button">示例</button>
              <button class="tool-button" id="clearScript" type="button">清空</button>
            </div>
          </div>
          <textarea id="scriptInput" spellcheck="false" placeholder="脚本正文"></textarea>
          <div class="editor-actions">
            <label class="file-button">
              <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" />
              导入
            </label>
            <button class="tool-button" id="downloadScript" type="button">导出</button>
          </div>
          <label class="switch-row editor-switch">
            <span>自动分句</span>
            <input id="autoSegmentToggle" type="checkbox" checked />
          </label>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>滚动</h2>
            <span class="value-pill"><output id="speedValue">48</output> px/s</span>
          </div>
          <label class="slider-row">
            <span>速度</span>
            <input id="speedInput" type="range" min="12" max="180" step="2" value="48" />
          </label>
          <div class="subsection">
            <div class="subsection-heading">
              <span>开场倒计时</span>
              <output id="countdownValue">0 秒</output>
            </div>
            <div class="segmented compact" role="group" aria-label="开场倒计时">
              <button class="segment active" data-countdown="0" type="button">关</button>
              <button class="segment" data-countdown="3" type="button">3 秒</button>
              <button class="segment" data-countdown="5" type="button">5 秒</button>
            </div>
          </div>
        </section>

        <section class="settings-grid">
          <label class="setting-box">
            <span>字号</span>
            <output id="fontSizeValue">56</output>
            <input id="fontSizeInput" type="range" min="28" max="104" step="2" value="56" />
          </label>
          <label class="setting-box">
            <span>行距</span>
            <output id="lineHeightValue">1.45</output>
            <input id="lineHeightInput" type="range" min="1.1" max="2" step="0.05" value="1.45" />
          </label>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>显示</h2>
          </div>
          <div class="segmented" role="group" aria-label="主题">
            <button class="segment active" data-theme="dark" type="button">黑底</button>
            <button class="segment" data-theme="paper" type="button">白底</button>
            <button class="segment" data-theme="studio" type="button">棚拍</button>
          </div>
          <div class="switch-list">
            <label class="switch-row">
              <span>镜像</span>
              <input id="mirrorToggle" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>焦点线</span>
              <input id="guideToggle" type="checkbox" checked />
            </label>
            <label class="switch-row">
              <span>防息屏</span>
              <input id="wakeToggle" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>聚焦模式</span>
              <input id="focusToggle" type="checkbox" checked />
            </label>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>脚本概览</h2>
          </div>
          <div class="stats-grid" aria-label="脚本统计">
            <div class="stat-card">
              <span>字数</span>
              <output id="charCountValue">0</output>
            </div>
            <div class="stat-card">
              <span>段落</span>
              <output id="paragraphCountValue">0</output>
            </div>
            <div class="stat-card wide">
              <span>预计全程</span>
              <output id="durationValue">00:00</output>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>朗读参考</h2>
            <span class="value-pill">设置</span>
          </div>
          <label class="select-row">
            <span>语音</span>
            <select id="voiceSelect" aria-label="朗读语音"></select>
          </label>
          <label class="slider-row">
            <span>语速</span>
            <input id="ttsRateInput" type="range" min="0.7" max="1.4" step="0.05" value="1" />
          </label>
          <p class="tts-panel-note">朗读按钮已经移到提词区悬浮工具里，全屏时也能直接使用。</p>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
